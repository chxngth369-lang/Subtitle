<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { max-width: 600px; width: 100%; background: #1e293b; padding: 25px; border-radius: 20px; text-align: center; }
        .btn { background: #6366f1; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .sub-item { background: #334155; margin: 10px 0; padding: 10px; border-radius: 8px; display: flex; align-items: center; }
        .sub-input { background: transparent; border: 1px solid #475569; color: #fbbf24; width: 100%; padding: 5px; font-size: 16px; border-radius: 5px; }
        #editor { display: none; margin-top: 20px; text-align: left; }
        .loader { display: none; color: #6366f1; margin: 10px 0; }
        #videoPlayer { width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✏️ AI Subtitle Editor</h2>
        <input type="file" id="fileInput" accept="video/*" class="btn">
        <button class="btn" id="transBtn" onclick="transcribe()">1. เริ่มแกะเสียง</button>
        <div class="loader" id="loader">กำลังทำงาน...</div>

        <div id="editor">
            <h3>📝 แก้ไขซับไตเติ้ลตรงนี้:</h3>
            <div id="subList"></div>
            <button class="btn" style="background: #22c55e;" onclick="burnVideo()">2. ยืนยันคำผิดและสร้างวิดีโอ</button>
        </div>

        <video id="videoPlayer" controls></video>
        <a href="/download" id="dlBtn" style="display:none"><button class="btn" style="background: #e11d48;">✅ 3. ดาวน์โหลดคลิปที่แก้แล้ว</button></a>
    </div>

    <script>
        let subs = [];
        async function transcribe() {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("เลือกไฟล์ก่อน!");
            const fd = new FormData(); fd.append('video', file);
            document.getElementById('loader').style.display = 'block';

            const res = await fetch('/transcribe', { method: 'POST', body: fd });
            subs = (await res.json()).segments;
            
            const list = document.getElementById('subList');
            list.innerHTML = "";
            subs.forEach((s, i) => {
                list.innerHTML += `<div class="sub-item">
                    <span style="margin-right:10px; color:#94a3b8">${Math.floor(s.start)}s</span>
                    <input class="sub-input" value="${s.text}" oninput="subs[${i}].text = this.value">
                </div>`;
            });
            document.getElementById('editor').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }

        async function burnVideo() {
            document.getElementById('loader').style.display = 'block';
            await fetch('/burn', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({subs: subs})
            });
            document.getElementById('videoPlayer').src = "/download?t=" + new Date().getTime();
            document.getElementById('videoPlayer').style.display = 'block';
            document.getElementById('dlBtn').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
