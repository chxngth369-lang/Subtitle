<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Super Subtitle</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; /* สีม่วงๆ เหมือน CapCut */
            --primary-dark: #4f46e5;
            --secondary: #a78bfa;
            --bg: #f8fafc;
            --text: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg);
            background-image: linear-gradient(135deg, #f0f9ff 10%, #e0f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(79, 70, 229, 0.15);
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--text); margin-bottom: 0.5rem; font-weight: 700; }
        .sub-header { color: #64748b; margin-bottom: 2rem; font-size: 0.9rem; }

        .upload-area {
            border: 3px dashed #cbd5e1;
            padding: 40px;
            border-radius: 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            background: white;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: #f5f3ff;
            transform: scale(1.02);
        }

        .upload-icon { font-size: 60px; color: var(--primary); margin-bottom: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #fileName { font-size: 1rem; color: #475569; font-weight: 500; word-break: break-all; }

        #submitBtn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        #submitBtn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }
        #submitBtn:disabled { background: linear-gradient(135deg, #94a3b8 0%, #cbd5e1 100%); cursor: not-allowed; box-shadow: none; transform: none; }

        .loading-container { display: none; margin-top: 25px; text-align: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: var(--primary); font-weight: 500; animation: fadeText 1.5s infinite; }
        @keyframes fadeText { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        #result {
            margin-top: 25px;
            text-align: left;
            background: #1e293b; /* สีดำๆ เหมือนจอตัดต่อ */
            color: #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            max-height: 350px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            font-size: 0.9rem;
            display: none;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }
        
        /* สไตล์ Scrollbar สวยๆ */
        #result::-webkit-scrollbar { width: 8px; }
        #result::-webkit-scrollbar-track { background: #334155; border-radius: 10px; }
        #result::-webkit-scrollbar-thumb { background: #64748b; border-radius: 10px; }
        #result::-webkit-scrollbar-thumb:hover { background: var(--secondary); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 AI Super Sub</h1>
        <p class="sub-header">ฟังภาษาไทย เป๊ะ! ไม่เอ๋อ! (by Groq Whisper Large V3)</p>
        
        <div class="upload-area" onclick="document.getElementById('videoInput').click()">
            <i class="fas fa-magic upload-icon"></i>
            <p id="fileName">คลิกเพื่อเลือกวิดีโอ (รองรับ MP4, MOV, etc.)</p>
            <input type="file" id="videoInput" accept="video/*" hidden onchange="updateFileName()">
        </div>

        <div id="loading" class="loading-container">
            <div class="spinner"></div>
            <p class="loading-text">กำลังแกะเสียงภาษาไทย... (ห้ามสลับแอป)</p>
        </div>

        <button id="submitBtn" onclick="uploadVideo()">✨ เริ่มสร้าง Subtitle</button>

        <div id="result"></div>
    </div>

    <script>
        // อัปเดตชื่อไฟล์เมื่อเลือก
        function updateFileName() {
            const input = document.getElementById('videoInput');
            const fileNameDisplay = document.getElementById('fileName');
            if (input.files.length > 0) {
                fileNameDisplay.innerText = "ไฟล์ที่เลือก: " + input.files[0].name;
            } else {
                fileNameDisplay.innerText = "คลิกเพื่อเลือกวิดีโอ";
            }
        }

        // ฟังก์ชันอัปโหลดหลัก
        async function uploadVideo() {
            const fileInput = document.getElementById('videoInput');
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const fileNameDisplay = document.getElementById('fileName');

            if (fileInput.files.length === 0) {
                alert('กรุณาเลือกไฟล์วิดีโอของน้องก่อนครับ!');
                return;
            }

            const formData = new FormData();
            formData.append('video', fileInput.files[0]);

            // เตรียมหน้าจอ
            btn.disabled = true;
            btn.style.display = 'none'; // ซ่อนปุ่ม
            loading.style.display = 'block'; // โชว์ตัวโหลด
            resultDiv.style.display = 'none'; // ซ่อนผลเก่า

            try {
                // ส่งไปที่ backend
                const response = await fetch('/transcribe', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                // แสดงผลลัพธ์
                if (data.subtitle) {
                    resultDiv.innerText = data.subtitle;
                    resultDiv.style.display = 'block';
                } else {
                    resultDiv.innerText = "เกิดข้อผิดพลาดในการประมวลผลครับ:\n" + data.error;
                    resultDiv.style.display = 'block';
                }
            } catch (e) {
                console.error('Error:', e);
                alert('เชื่อมต่อ Server ไม่ได้ กรุณาเช็กหน้าจอดำ (Terminal) ว่ารันอยู่ไหม? และห้ามสลับหน้าจอ iPad ตอนอัปโหลดครับ');
            } finally {
                // คืนค่าหน้าจอ
                btn.disabled = false;
                btn.style.display = 'block'; // โชว์ปุ่มคืน
                loading.style.display = 'none'; // ซ่อนตัวโหลด
            }
        }
    </script>
</body>
</html>
