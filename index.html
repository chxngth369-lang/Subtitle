<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { max-width: 500px; width: 100%; background: #1e293b; padding: 30px; border-radius: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .upload-area { border: 2px dashed #6366f1; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; }
        .btn { background: #6366f1; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-download { background: #22c55e; display: none; }
        #videoPlayer { width: 100%; border-radius: 12px; margin-top: 20px; display: none; }
        #subText { font-size: 22px; color: #fbbf24; margin-top: 10px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        .loading { display: none; color: #6366f1; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎬 AI Auto Subtitle</h2>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p id="fileName">📁 เลือกวิดีโอของคุณ</p>
            <input type="file" id="fileInput" hidden accept="video/*" onchange="document.getElementById('fileName').innerText = this.files[0].name">
        </div>
        <button class="btn" id="runBtn" onclick="start()">🚀 เริ่มสร้างซับไตเติ้ล</button>
        <div class="loading" id="loader">🔄 กำลังประมวลผล... ห้ามปิดหน้าจอนะ</div>
        <a href="/download" id="dlLink"><button class="btn btn-download" id="dlBtn">✅ ดาวน์โหลดวิดีโอ (ซับติดถาวร)</button></a>
        <video id="videoPlayer" controls></video>
        <div id="subText"></div>
    </div>

    <script>
        let subs = [];
        async function start() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("เลือกไฟล์ก่อนครับ");
            const fd = new FormData(); fd.append('video', file);

            document.getElementById('runBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const res = await fetch('/transcribe', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) {
                    subs = data.segments;
                    document.getElementById('videoPlayer').src = URL.createObjectURL(file);
                    document.getElementById('videoPlayer').style.display = 'block';
                    document.getElementById('dlBtn').style.display = 'block';
                    document.getElementById('videoPlayer').ontimeupdate = function() {
                        const now = this.currentTime;
                        const active = subs.find(s => now >= s.start && now <= s.end);
                        document.getElementById('subText').innerText = active ? active.text : "";
                    };
                }
            } catch (e) { alert("เกิดข้อผิดพลาด!"); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }
    </script>
</body>
</html>
